name: Desktop Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/**
    tags:
      - v*

permissions:
  contents: write

jobs:
  build-packages:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest
    defaults:
      run:
        working-directory: packages
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Build desktop packages
        run: npm run dist

      - name: Upload desktop packages
        uses: actions/upload-artifact@v6
        with:
          name: cppx-package-${{ matrix.os }}
          path: |
            packages/dist/*.zip
            packages/dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: Download desktop packages
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Publish GitHub release with desktop packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.tar.gz
