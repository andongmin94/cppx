name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest
    defaults:
      run:
        working-directory: packages
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/package-lock.json

      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential zip

      - name: Install macOS prerequisites
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install Windows prerequisites
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install cmake ninja -y
          "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Build app
        run: npm run build

      - name: Package release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactRoot = Join-Path $env:GITHUB_WORKSPACE "release-artifacts"
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null
          $zipPath = Join-Path $artifactRoot "cppx-${{ matrix.os }}.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path out\* -DestinationPath $zipPath

      - name: Package release archive (POSIX)
        if: runner.os != 'Windows'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release-artifacts"
          cd out
          zip -rq "$GITHUB_WORKSPACE/release-artifacts/cppx-${{ matrix.os }}.zip" .

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: cppx-release-${{ matrix.os }}
          path: release-artifacts/cppx-${{ matrix.os }}.zip
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.zip
