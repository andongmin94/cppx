name: Native CI

on:
  push:
    branches:
      - main
      - codex/**
    tags:
      - v*
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-24.04
    defaults:
      run:
        working-directory: packages
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/package-lock.json

      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential

      - name: Install Windows prerequisites
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install cmake ninja -y
          "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Build app
        run: npm run build

      - name: Upload app artifact
        uses: actions/upload-artifact@v6
        with:
          name: cppx-app-${{ matrix.os }}
          path: packages/out
          if-no-files-found: error
          retention-days: 7

      - name: Prepare Windows native smoke
        if: runner.os == 'Windows'
        run: npm run cppx -- install-tools --compiler msvc

      - name: Native smoke
        if: runner.os != 'macOS'
        shell: pwsh
        run: |
          function Format-GitHubAnnotation([string]$value) {
            return $value.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
          }

          if ($env:RUNNER_OS -eq 'Windows') {
            where.exe cmake
            where.exe ninja
            & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
              -products * `
              -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
              -latest `
              -property installationPath
          }

          $output = & node ./scripts/run-smoke-ci.mjs 2>&1
          $exitCode = $LASTEXITCODE
          $output | ForEach-Object { $_ }

          if ($exitCode -ne 0) {
            $tail = (
              $output |
              ForEach-Object { $_.ToString() } |
              Where-Object { $_.Trim().Length -gt 0 } |
              Select-Object -Last 120
            ) -join "`n"
            Write-Host "::error title=Native smoke failure::$(Format-GitHubAnnotation($tail))"
            exit $exitCode
          }

      - name: macOS managed vcpkg smoke
        if: runner.os == 'macOS'
        shell: pwsh
        run: |
          $env:CPPX_SMOKE_TOOL_MODE = "managed"
          $env:CPPX_SMOKE_CXX_MODE = "system"
          $env:CPPX_SMOKE_BACKEND = "vcpkg"
          node ./scripts/run-smoke-ci.mjs

      - name: macOS managed conan smoke
        if: runner.os == 'macOS'
        shell: pwsh
        run: |
          $env:CPPX_SMOKE_TOOL_MODE = "managed"
          $env:CPPX_SMOKE_CXX_MODE = "system"
          $env:CPPX_SMOKE_BACKEND = "conan"
          node ./scripts/run-smoke-ci.mjs

      - name: macOS exact-version vcpkg smoke
        if: runner.os == 'macOS'
        shell: pwsh
        run: |
          $env:CPPX_SMOKE_TOOL_MODE = "managed"
          $env:CPPX_SMOKE_CXX_MODE = "system"
          $env:CPPX_SMOKE_BACKEND = "vcpkg"
          $env:CPPX_SMOKE_CMAKE_VERSION = "4.2.3"
          $env:CPPX_SMOKE_NINJA_VERSION = "1.12.1"
          $env:CPPX_SMOKE_VCPKG_VERSION = "2026.02.27"
          node ./scripts/run-smoke-ci.mjs

      - name: macOS exact-version conan smoke
        if: runner.os == 'macOS'
        shell: pwsh
        run: |
          $env:CPPX_SMOKE_TOOL_MODE = "managed"
          $env:CPPX_SMOKE_CXX_MODE = "system"
          $env:CPPX_SMOKE_BACKEND = "conan"
          $env:CPPX_SMOKE_CMAKE_VERSION = "4.2.3"
          $env:CPPX_SMOKE_NINJA_VERSION = "1.12.1"
          $env:CPPX_SMOKE_CONAN_VERSION = "2.23.0"
          node ./scripts/run-smoke-ci.mjs

      - name: Linux managed vcpkg smoke
        if: runner.os == 'Linux'
        shell: pwsh
        run: |
          $env:CPPX_SMOKE_TOOL_MODE = "managed"
          $env:CPPX_SMOKE_CXX_MODE = "managed"
          $env:CPPX_SMOKE_BACKEND = "vcpkg"
          node ./scripts/run-smoke-ci.mjs

      - name: Linux managed conan smoke
        if: runner.os == 'Linux'
        shell: pwsh
        run: |
          $env:CPPX_SMOKE_TOOL_MODE = "managed"
          $env:CPPX_SMOKE_CXX_MODE = "managed"
          $env:CPPX_SMOKE_BACKEND = "conan"
          node ./scripts/run-smoke-ci.mjs

      - name: Linux exact-version vcpkg smoke
        if: runner.os == 'Linux'
        shell: pwsh
        run: |
          $env:CPPX_SMOKE_TOOL_MODE = "managed"
          $env:CPPX_SMOKE_CXX_MODE = "managed"
          $env:CPPX_SMOKE_BACKEND = "vcpkg"
          $env:CPPX_SMOKE_CMAKE_VERSION = "4.2.3"
          $env:CPPX_SMOKE_NINJA_VERSION = "1.12.1"
          $env:CPPX_SMOKE_VCPKG_VERSION = "2026.02.27"
          node ./scripts/run-smoke-ci.mjs

      - name: Linux exact-version conan smoke
        if: runner.os == 'Linux'
        shell: pwsh
        run: |
          $env:CPPX_SMOKE_TOOL_MODE = "managed"
          $env:CPPX_SMOKE_CXX_MODE = "managed"
          $env:CPPX_SMOKE_BACKEND = "conan"
          $env:CPPX_SMOKE_CMAKE_VERSION = "4.2.3"
          $env:CPPX_SMOKE_NINJA_VERSION = "1.12.1"
          $env:CPPX_SMOKE_CONAN_VERSION = "2.23.0"
          node ./scripts/run-smoke-ci.mjs

      - name: Windows managed smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $workspace = Join-Path $env:RUNNER_TEMP "cppx-windows-managed"
          if (Test-Path $workspace) {
            Remove-Item -Recurse -Force $workspace
          }

          npm run cppx -- install-tools --compiler mingw
          npm run cppx -- init $workspace --name smoke-app
          npm run cppx -- build $workspace
          npm run cppx -- run $workspace
          npm run cppx -- test $workspace
          npm run cppx -- pack $workspace

      - name: Windows exact-version vcpkg smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:CPPX_SMOKE_TOOL_MODE = "managed"
          $env:CPPX_SMOKE_CXX_MODE = "managed"
          $env:CPPX_SMOKE_BACKEND = "vcpkg"
          $env:CPPX_SMOKE_CMAKE_VERSION = "3.30.5"
          $env:CPPX_SMOKE_NINJA_VERSION = "1.12.1"
          $env:CPPX_SMOKE_VCPKG_VERSION = "2026.02.27"
          node ./scripts/run-smoke-ci.mjs

      - name: Windows exact-version conan smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:CPPX_SMOKE_TOOL_MODE = "managed"
          $env:CPPX_SMOKE_CXX_MODE = "managed"
          $env:CPPX_SMOKE_BACKEND = "conan"
          $env:CPPX_SMOKE_CMAKE_VERSION = "3.30.5"
          $env:CPPX_SMOKE_NINJA_VERSION = "1.12.1"
          $env:CPPX_SMOKE_CONAN_VERSION = "2.23.0"
          node ./scripts/run-smoke-ci.mjs

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install docs dependencies
        run: cd docs && npm ci

      - name: Build docs
        run: cd docs && npm run docs-build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v6
        with:
          name: cppx-docs-site
          path: docs/.vitepress/dist
          if-no-files-found: error
          retention-days: 7
