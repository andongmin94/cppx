name: Bug Report
description: 동작 오류나 회귀를 제보합니다.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: 무엇이 잘못됐는지 짧게 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 가능한 한 정확한 재현 절차를 적어 주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대한 결과
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 환경
      description: 운영체제, Node 버전, 사용한 명령어를 적어 주세요.
      placeholder: |
        OS:
        Node:
        Command:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 로그 / 스크린샷
      description: 관련 로그, `cppx doctor` 출력, 스크린샷이 있으면 붙여 주세요.
