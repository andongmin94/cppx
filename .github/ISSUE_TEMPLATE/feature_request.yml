name: Feature Request
description: 새 기능이나 개선 아이디어를 제안합니다.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 어떤 불편이나 한계를 해결하고 싶은지 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 동작이나 인터페이스를 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안 / 우회 방법
      description: 현재 쓰고 있는 우회 방법이나 고려한 대안이 있으면 적어 주세요.
  - type: textarea
    id: context
    attributes:
      label: 추가 맥락
      description: 관련 워크플로, 예시 config, 링크가 있으면 적어 주세요.
